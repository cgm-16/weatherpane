<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#f0eded",

                        "on-tertiary-fixed-variant": "#005234",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "secondary-fixed": "#e3e2e2",
                        "primary-fixed-dim": "#ffb2b6",
                        "inverse-primary": "#ffb2b6",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#ffdada",
                        "tertiary-fixed": "#80f9bd",
                        "surface": "#fcf9f8",
                        "on-surface-variant": "#5c3f41",
                        "surface-variant": "#e5e2e1",
                        "primary-container": "#e21e4a",
                        "on-secondary-container": "#646464",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f6f3f2",
                        "tertiary": "#006a45",

                        "secondary": "#5e5e5e",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#920029",
                        "on-primary-fixed": "#40000d",
                        "tertiary-container": "#008558",
                        "on-tertiary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#464747",
                        "tertiary-fixed-dim": "#62dca3",
                        "secondary-fixed-dim": "#c7c6c6",

                    "borderRadius": {

                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    }

            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .backdrop-blur-20 {
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-zinc-950/50 backdrop-blur-[20px]">
<div class="flex items-center gap-4">
<button class="hover:bg-zinc-800/40 transition-colors scale-95 active:duration-150 p-2 rounded-full">
<span class="material-symbols-outlined text-[#ffb2b6]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#ffb2b6]">Busan, South Korea</h1>
</div>
<button class="hover:bg-zinc-800/40 transition-colors scale-95 active:duration-150 p-2 rounded-full">
<span class="material-symbols-outlined text-[#ffb2b6]" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-6 bg-cover bg-center" data-alt="Dreamy atmospheric coastal landscape of Korea with thick white morning mist rolling over dark blue ocean cliffs and soft dawn light" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuA9EWkULK3AilFRxJGk6m0E9ZpE8lK0z-9LMA0OKw9uoMN7eP8SGYSJ9bP6f4erILdjC2t8B8_tgbhtQbx5SPKEDuywP31pmDygWmviuHelIcKp6ofuZlqmn99Z7uhlTHBdJXfcD4p-QaCgVsDL7XWlxV8gFc0JpL0rKzIgSv5XF1rccefD0yNV2kd4Pg2ibtoX28qt7J4-729NHW-P_I5arcQd9bY5T6RoUIWwBu7DIGA5AkYW_KAuqvnNwEpE_Mj07XFPqGXAj_-T')">
<!-- Error Content Card (Glassmorphism) -->
<div class="w-full max-w-sm bg-surface-container-highest/50 backdrop-blur-20 rounded-lg p-8 flex flex-col items-center text-center space-y-6 shadow-2xl">
<div class="space-y-2">
<span class="font-headline font-extrabold text-primary tracking-widest text-xs uppercase opacity-80">ATMOSPHERIC ERROR 404</span>
<h2 class="font-headline font-bold text-3xl tracking-tight text-on-surface">Lost in the Mist</h2>
</div>
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full animate-pulse"></div>
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 0;">cloud_off</span>
</div>
<p class="font-body text-on-surface-variant leading-relaxed text-sm">
                We couldn't find the page you're looking for. It might have drifted away in the fog.
            </p>
<div class="w-full space-y-3 pt-4">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline font-bold py-4 rounded-sm transition-all active:scale-95 flex items-center justify-center gap-2">
                    Take me Home
                </button>
<button class="w-full bg-secondary-container hover:bg-surface-container-high text-on-secondary-fixed font-headline font-semibold py-4 rounded-sm transition-all active:scale-95 flex items-center justify-center gap-2">
                    Check Forecast
                </button>
</div>
</div>
<!-- Decorative Floating Detail -->
<div class="absolute top-1/4 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-1/4 -left-12 w-40 h-40 bg-on-primary-fixed-variant/5 rounded-full blur-3xl"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-zinc-950/50 backdrop-blur-[20px] shadow-[0_-4px_20px_rgba(0,0,0,0.3)]">
<a class="flex flex-col items-center justify-center text-zinc-500 py-2 hover:text-zinc-200 transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Inactive Search -->
<a class="flex flex-col items-center justify-center text-zinc-500 py-2 hover:text-zinc-200 transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Search</span>
</a>
<!-- Active Favorites (Semantic Mapping for Busan context) -->
<a class="flex flex-col items-center justify-center text-[#ff385c] py-2 hover:text-zinc-200 transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Favorites</span>
</a>
</nav>
</body></html>
