<!DOCTYPE html>

<style>
        .glass-panel {
            background-color: rgba(229, 226, 225, 0.5); /* surface-container-highest at 50% */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-zinc-950/50 backdrop-blur-[20px]">
<div class="flex items-center gap-4">
<button class="text-[#ffb2b6] hover:bg-zinc-800/40 transition-colors p-2 rounded-full active:scale-95 active:duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#ffb2b6]">Busan, South Korea</h1>
</div>
<button class="text-[#ffb2b6] hover:bg-zinc-800/40 transition-colors p-2 rounded-full active:scale-95 active:duration-150">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Main Content: Background Image Layer -->
<main class="relative flex-1 flex flex-col items-center justify-center pt-16 pb-20 overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Foggy Urban View" class="w-full h-full object-cover" data-alt="Minimalist foggy urban sketch of Seoul skyline with soft muted greys and white atmospheric mist" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5U1lBPhZoI9MCDl_t0R8OXPf4_OTZ5nxWEC4tkqJ0BrlpdDb8Jr2jFd7mYo7GHsctOu50WTQhPOjKHEr5UMnH26gFP-vN4Fjq07MkfrsC9SFsIx_FJD8Rz1QzYimkVojCqGZc2oNyXXRFdIcNDXyq8EyWaHeofJ78SvsZH941wHhl3McbkeYrxu44UiVNPIsFB66OlYk7Iuc71gsAHvFJVcm_kvlqo1xCcNOAv_V8NdUeJCeL0wNmRTLWT6y5yI2OHbCcYez9uiLg"/>
<div class="absolute inset-0 bg-surface/30 mix-blend-overlay"></div>
</div>
<!-- Error Card: Glassmorphism -->
<div class="relative z-10 w-full max-w-sm px-6">
<div class="glass-panel p-8 rounded-lg text-center flex flex-col items-center">
<!-- Icon/Graphic -->
<div class="mb-6 flex items-center justify-center w-20 h-20 rounded-full bg-surface-container-lowest">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">desktop_windows</span>
</div>
<!-- Editorial Headline -->
<h2 class="font-headline font-extrabold text-3xl text-on-surface mb-4 leading-tight">Feature Unavailable</h2>
<!-- Technical Writing -->
<p class="font-body text-on-surface-variant text-base leading-relaxed mb-10">
                    This part of the journey is currently exclusive to our desktop experience. We're working on bringing it to your mobile device soon.
                </p>
<!-- Action Cluster -->
<div class="w-full space-y-4">
<button class="w-full bg-primary text-on-primary py-4 px-6 rounded-sm font-semibold text-base transition-colors hover:bg-primary-container active:scale-95 duration-150">
                        Return Home
                    </button>
<button class="w-full bg-secondary-container text-on-secondary-fixed py-4 px-6 rounded-sm font-semibold text-base transition-colors hover:bg-surface-container-high active:scale-95 duration-150">
                        View Documentation
                    </button>
</div>
</div>
<!-- Asymmetric Detail: Small atmospheric chip -->
<div class="mt-8 flex justify-end">
<div class="bg-surface-container-high/60 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-xs">cloud</span>
<span class="text-[10px] font-headline font-bold uppercase tracking-widest text-on-surface-variant">Atmospheric Editor v2.4</span>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-zinc-950/50 backdrop-blur-[20px] shadow-[0_-4px_20px_rgba(0,0,0,0.3)]">
<a class="flex flex-col items-center justify-center text-zinc-500 py-2 hover:text-zinc-200 transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 py-2 hover:text-zinc-200 transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Search</span>
</a>

<span class="material-symbols-outlined">favorite</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold uppercase tracking-wider mt-1">Favorites</span>
</a>
