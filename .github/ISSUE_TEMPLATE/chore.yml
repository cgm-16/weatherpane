name: Chore
description: Non-feature maintenance work
title: "[Chore] "
labels: ["type:chore", "status:needs-triage"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Normalize tsconfig path aliases
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - app-shell
        - weather
        - search
        - favorites
        - routing
        - storage
        - assets
        - theme
        - a11y
        - testing
        - ci
        - docs
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why this matters
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
