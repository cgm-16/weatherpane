name: Documentation
description: Docs work for README, spec, setup, ADRs, or agent guidance
title: "[Docs] "
labels: ["type:docs", "status:needs-triage"]
body:
  - type: dropdown
    id: doc_type
    attributes:
      label: Document type
      options:
        - README
        - specification
        - setup
        - architecture
        - agent guidance
        - testing
        - deployment
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Document mock/demo mode and env flags
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why this is needed
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      placeholder: Files to create/update, screenshots, examples, commands
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
