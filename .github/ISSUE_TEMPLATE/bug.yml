name: Bug
description: Report a defect in Weatherpane
title: "[Bug] "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - app-shell
        - weather
        - search
        - favorites
        - routing
        - storage
        - assets
        - theme
        - a11y
        - testing
        - ci
        - docs
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: One-line summary
      placeholder: Favorites reorder is not persisted after reload
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      placeholder: What happens now?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to Favorites
        2. Enter 편집 mode
        3. Move card A below card B
        4. Tap 완료
        5. Reload
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - p0 - blocking
        - p1 - major
        - p2 - normal
        - p3 - minor
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Browser, OS, device, branch, mock/real API mode
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots / trace
      placeholder: Paste stack traces, screenshots, Playwright trace references, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for duplicates
          required: true
        - label: I can reproduce this on the latest branch state
          required: true
